version: '3.8'

services:
  rtx-toolkit-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rtx-toolkit-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_NAME=${BOT_NAME:-RTX Toolkit Bot}
      - BOT_USERNAME=${BOT_USERNAME:-rtx_toolkit_bot}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-logs/bot.log}
      - PORT=${PORT:-3000}
    volumes:
      - ./logs:/app/logs
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rtx-network

  # Optional: Add a monitoring service
  watchtower:
    image: containrrr/watchtower:latest
    container_name: rtx-bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_STOPPED=true
    networks:
      - rtx-network

networks:
  rtx-network:
    driver: bridge

volumes:
  bot-logs:
    driver: local